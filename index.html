<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Worth It?" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<title>Is it worth it?</title>
<style>
  :root {
    --bg: #f8fafc;
    --surface: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --accent: #16a34a;
    --accent-soft: #dcfce7;
    --danger: #dc2626;
    --border: #e2e8f0;
    --chip-bg: #f1f5f9;
    --chip-active-bg: #0f172a;
    --chip-active-text: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #4ade80;
      --accent-soft: #14532d;
      --danger: #f87171;
      --border: #334155;
      --chip-bg: #334155;
      --chip-active-bg: #f1f5f9;
      --chip-active-text: #0f172a;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 8px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .icon-btn {
    background: transparent;
    border: 0;
    padding: 8px;
    margin: -8px;
    border-radius: 999px;
    color: var(--muted);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover, .icon-btn:focus-visible { color: var(--text); }
  .icon-btn svg { width: 22px; height: 22px; }
  main {
    flex: 1;
    padding: 8px 20px 24px;
    max-width: 560px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    background: var(--chip-bg);
    color: var(--text);
    border: 0;
    padding: 10px 14px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 120ms ease, color 120ms ease;
  }
  .chip[aria-pressed="true"] {
    background: var(--chip-active-bg);
    color: var(--chip-active-text);
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }
  .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .amount {
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin: 0;
    color: var(--text);
    cursor: text;
    display: inline-block;
    min-width: 1ch;
    border-radius: 6px;
    padding: 2px 4px;
    margin-left: -4px;
  }
  .amount:hover { background: var(--chip-bg); }
  .amount.editing {
    outline: 2px solid var(--accent);
    background: var(--surface);
  }
  .future-card {
    background: linear-gradient(135deg, var(--accent-soft), var(--surface));
    border-color: transparent;
  }
  .future-amount {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -0.025em;
    color: var(--accent);
    margin: 0;
    line-height: 1.05;
  }
  .future-sub {
    margin-top: 10px;
    font-size: 14px;
    color: var(--muted);
  }
  .editable-inline {
    color: var(--text);
    font-weight: 600;
    border-bottom: 1px dashed var(--muted);
    cursor: pointer;
    padding: 0 2px;
  }
  .editable-inline:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .toggle {
    display: inline-flex;
    background: var(--chip-bg);
    border-radius: 999px;
    padding: 3px;
    margin-top: 14px;
  }
  .toggle button {
    background: transparent;
    border: 0;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
  }
  .toggle button[aria-pressed="true"] {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .assumption {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }
  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 10;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    color: var(--text);
    width: 100%;
    max-width: 560px;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    animation: slideUp 220ms ease;
  }
  @media (min-width: 600px) {
    .modal-backdrop { align-items: center; }
    .modal { border-radius: 20px; margin: 20px; }
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal h2 {
    margin: 0 0 16px;
    font-size: 18px;
    font-weight: 600;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }
  .field label {
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
  }
  .field input {
    font-size: 16px; /* prevent iOS zoom */
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
  }
  .field input:focus {
    outline: 2px solid var(--accent);
    outline-offset: -1px;
    border-color: transparent;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .btn {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 0;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--chip-bg); color: var(--text); }
  .amount-input {
    font: inherit;
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    background: transparent;
    border: 0;
    width: 100%;
    padding: 2px 4px;
    margin-left: -4px;
    outline: 2px solid var(--accent);
    border-radius: 6px;
    -webkit-appearance: none;
    appearance: none;
  }
  .years-input {
    font: inherit;
    font-weight: 600;
    color: var(--text);
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--accent);
    width: 3.5ch;
    text-align: center;
    padding: 0;
    -webkit-appearance: none;
    appearance: none;
  }
  .years-input:focus { outline: none; }
</style>
</head>
<body>
<header>
  <h1>Is it worth it?</h1>
  <button class="icon-btn" id="settings-btn" aria-label="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</header>

<main>
  <div class="chips" role="group" aria-label="Purchase type">
    <button class="chip" data-preset="coffee" data-amount="6">Coffee</button>
    <button class="chip" data-preset="takeout" data-amount="20">Take-Out</button>
    <button class="chip" data-preset="lunch" data-amount="15">Lunch</button>
    <button class="chip" data-preset="nightout" data-amount="60">Night Out</button>
    <button class="chip" data-preset="custom">Custom</button>
  </div>

  <section class="card" aria-labelledby="today-label">
    <div class="label" id="today-label">If you spend</div>
    <div>
      <span class="amount" id="today-amount" tabindex="0" role="button" aria-label="Tap to edit amount">$20</span>
    </div>
  </section>

  <section class="card future-card" aria-labelledby="future-label">
    <div class="label" id="future-label">It could be worth</div>
    <p class="future-amount" id="future-amount">$0</p>
    <p class="future-sub">
      in <span class="editable-inline" id="years-display" tabindex="0" role="button" aria-label="Tap to change years">32</span> years
    </p>
    <div class="toggle" role="group" aria-label="Return assumption">
      <button id="toggle-real" aria-pressed="true">Today's $</button>
      <button id="toggle-nominal" aria-pressed="false">Future $</button>
    </div>
  </section>

  <p class="assumption" id="assumption-text">
    Assuming 7% real return (S&amp;P 500 historical, inflation-adjusted)
  </p>
</main>

<div class="modal-backdrop" id="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
  <div class="modal">
    <h2 id="settings-title">Retirement settings</h2>
    <div class="field">
      <label for="birth-year">Birth year</label>
      <input type="number" id="birth-year" inputmode="numeric" placeholder="e.g. 1990" min="1900" max="2100" />
    </div>
    <div class="field">
      <label for="retirement-age">Retirement age</label>
      <input type="number" id="retirement-age" inputmode="numeric" placeholder="e.g. 65" min="18" max="120" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="settings-cancel">Cancel</button>
      <button class="btn btn-primary" id="settings-save">Save</button>
    </div>
  </div>
</div>

<script>
(() => {
  const STORAGE_KEY = 'worth-it-v1';
  const REAL_RATE = 0.07;
  const NOMINAL_RATE = 0.10;
  const DEFAULT_YEARS = 32;

  const presetLabels = {
    coffee: 'Coffee',
    takeout: 'Take-Out',
    lunch: 'Lunch',
    nightout: 'Night Out',
    custom: 'Custom',
  };

  const state = {
    amount: 20,
    activePreset: 'takeout',
    yearsOverride: null,     // session-only
    mode: 'real',            // 'real' | 'nominal'
    birthYear: null,
    retirementAge: null,
  };

  const fmt = new Intl.NumberFormat('en-US', {
    style: 'currency', currency: 'USD', maximumFractionDigits: 0,
  });

  // ---- persistence ----
  function loadPrefs() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const p = JSON.parse(raw);
      if (typeof p.birthYear === 'number') state.birthYear = p.birthYear;
      if (typeof p.retirementAge === 'number') state.retirementAge = p.retirementAge;
      if (p.mode === 'real' || p.mode === 'nominal') state.mode = p.mode;
    } catch (e) {}
  }
  function savePrefs() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        birthYear: state.birthYear,
        retirementAge: state.retirementAge,
        mode: state.mode,
      }));
    } catch (e) {}
  }

  // ---- derived ----
  function years() {
    if (state.yearsOverride != null) return state.yearsOverride;
    if (state.birthYear != null && state.retirementAge != null) {
      const target = state.birthYear + state.retirementAge;
      const now = new Date().getFullYear();
      return Math.max(0, target - now);
    }
    return DEFAULT_YEARS;
  }
  function futureValue() {
    const r = state.mode === 'real' ? REAL_RATE : NOMINAL_RATE;
    return state.amount * Math.pow(1 + r, years());
  }

  // ---- render ----
  const $ = (id) => document.getElementById(id);
  const els = {
    todayAmount: $('today-amount'),
    futureAmount: $('future-amount'),
    yearsDisplay: $('years-display'),
    assumption: $('assumption-text'),
    toggleReal: $('toggle-real'),
    toggleNominal: $('toggle-nominal'),
    settingsBtn: $('settings-btn'),
    settingsModal: $('settings-modal'),
    settingsCancel: $('settings-cancel'),
    settingsSave: $('settings-save'),
    birthYearInput: $('birth-year'),
    retirementAgeInput: $('retirement-age'),
  };
  const chipEls = document.querySelectorAll('.chip');

  function render() {
    els.todayAmount.textContent = fmt.format(state.amount);
    els.futureAmount.textContent = fmt.format(futureValue());
    els.yearsDisplay.textContent = years();
    chipEls.forEach(c => {
      c.setAttribute('aria-pressed', c.dataset.preset === state.activePreset ? 'true' : 'false');
    });
    els.toggleReal.setAttribute('aria-pressed', state.mode === 'real' ? 'true' : 'false');
    els.toggleNominal.setAttribute('aria-pressed', state.mode === 'nominal' ? 'true' : 'false');
    els.assumption.innerHTML = state.mode === 'real'
      ? 'Assuming 7% real return (S&amp;P 500 historical, inflation-adjusted)'
      : 'Assuming 10% nominal return (S&amp;P 500 historical, not inflation-adjusted)';
  }

  // ---- preset chips ----
  chipEls.forEach(chip => {
    chip.addEventListener('click', () => {
      const preset = chip.dataset.preset;
      state.activePreset = preset;
      if (preset !== 'custom' && chip.dataset.amount) {
        state.amount = parseFloat(chip.dataset.amount);
      }
      render();
    });
  });

  // ---- editable today amount ----
  function startEditAmount() {
    if (els.todayAmount.classList.contains('editing')) return;
    const input = document.createElement('input');
    input.type = 'text';
    input.inputMode = 'decimal';
    input.className = 'amount-input';
    input.value = String(state.amount);
    input.setAttribute('aria-label', 'Amount');
    const parent = els.todayAmount.parentNode;
    parent.replaceChild(input, els.todayAmount);
    input.focus();
    input.select();

    const commit = () => {
      const raw = input.value.replace(/[^0-9.]/g, '');
      const v = parseFloat(raw);
      if (!isNaN(v) && v >= 0) {
        state.amount = v;
        state.activePreset = 'custom';
      }
      parent.replaceChild(els.todayAmount, input);
      render();
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') {
        input.value = String(state.amount);
        input.blur();
      }
    });
  }
  els.todayAmount.addEventListener('click', startEditAmount);
  els.todayAmount.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startEditAmount(); }
  });

  // ---- editable years (session override) ----
  function startEditYears() {
    if (document.querySelector('.years-input')) return;
    const input = document.createElement('input');
    input.type = 'text';
    input.inputMode = 'numeric';
    input.className = 'years-input';
    input.value = String(years());
    input.setAttribute('aria-label', 'Years to retirement');
    const parent = els.yearsDisplay.parentNode;
    parent.replaceChild(input, els.yearsDisplay);
    input.focus();
    input.select();

    const commit = () => {
      const v = parseInt(input.value.replace(/[^0-9]/g, ''), 10);
      if (!isNaN(v) && v >= 0 && v <= 100) {
        state.yearsOverride = v;
      }
      parent.replaceChild(els.yearsDisplay, input);
      render();
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = String(years()); input.blur(); }
    });
  }
  els.yearsDisplay.addEventListener('click', startEditYears);
  els.yearsDisplay.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startEditYears(); }
  });

  // ---- toggle ----
  els.toggleReal.addEventListener('click', () => { state.mode = 'real'; savePrefs(); render(); });
  els.toggleNominal.addEventListener('click', () => { state.mode = 'nominal'; savePrefs(); render(); });

  // ---- settings modal ----
  function openSettings() {
    els.birthYearInput.value = state.birthYear ?? '';
    els.retirementAgeInput.value = state.retirementAge ?? '';
    els.settingsModal.classList.add('open');
    setTimeout(() => els.birthYearInput.focus(), 50);
  }
  function closeSettings() {
    els.settingsModal.classList.remove('open');
  }
  function saveSettings() {
    const by = parseInt(els.birthYearInput.value, 10);
    const ra = parseInt(els.retirementAgeInput.value, 10);
    state.birthYear = (!isNaN(by) && by >= 1900 && by <= 2100) ? by : null;
    state.retirementAge = (!isNaN(ra) && ra >= 18 && ra <= 120) ? ra : null;
    state.yearsOverride = null; // settings now drive years again
    savePrefs();
    render();
    closeSettings();
  }
  els.settingsBtn.addEventListener('click', openSettings);
  els.settingsCancel.addEventListener('click', closeSettings);
  els.settingsSave.addEventListener('click', saveSettings);
  els.settingsModal.addEventListener('click', (e) => {
    if (e.target === els.settingsModal) closeSettings();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && els.settingsModal.classList.contains('open')) closeSettings();
  });

  // ---- init ----
  loadPrefs();
  render();
})();
</script>
</body>
</html>
